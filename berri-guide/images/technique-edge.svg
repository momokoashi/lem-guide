<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 700" width="520" height="700">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5EDE0"/>
      <stop offset="100%" stop-color="#EDE3D4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="700" rx="24" fill="url(#bgGrad)"/>


  <!-- Base line / x-axis -->
  <line x1="30" y1="520" x2="490" y2="520" stroke="#D4C4B0" stroke-width="2"/>

  <!-- The wave path - builds up, pulls back, builds higher, pulls back, then climax -->
  <path d="M40 500
           Q70 490 95 460
           Q120 420 145 350
           Q160 300 170 270
           L185 340
           Q200 400 220 440
           Q235 470 250 480
           Q265 470 280 430
           Q300 370 315 290
           Q325 230 335 200
           L350 280
           Q365 340 380 380
           Q390 400 400 390
           Q415 360 425 290
           Q435 220 445 160
           Q455 100 465 70"
           fill="none" stroke="#FF30CC" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Lime green fill under wave for "pull back" areas -->
  <path d="M170 270 L185 340 Q200 400 220 440 Q235 470 250 480" fill="none" stroke="#CCFD28" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M335 200 L350 280 Q365 340 380 380 Q390 400 400 390" fill="none" stroke="#CCFD28" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

  <!-- Star at first peak -->
  <g transform="translate(170, 258)">
    <polygon points="0,-12 3,-4 12,-4 5,2 7,11 0,6 -7,11 -5,2 -12,-4 -3,-4" fill="#FF30CC"/>
  </g>
  <!-- Label: Build up -->
  <text x="100" y="245" font-family="Arial, sans-serif" font-size="14" fill="#FF30CC" font-weight="bold">Build up</text>

  <!-- Star at second peak -->
  <g transform="translate(335, 188)">
    <polygon points="0,-12 3,-4 12,-4 5,2 7,11 0,6 -7,11 -5,2 -12,-4 -3,-4" fill="#FF30CC"/>
  </g>
  <!-- Label: Build up -->
  <text x="275" y="178" font-family="Arial, sans-serif" font-size="14" fill="#FF30CC" font-weight="bold">Build up</text>

  <!-- Pull back labels -->
  <text x="195" y="495" font-family="Arial, sans-serif" font-size="13" fill="#8B9B00" font-weight="bold" font-style="italic">Pull back</text>
  <text x="355" y="415" font-family="Arial, sans-serif" font-size="13" fill="#8B9B00" font-weight="bold" font-style="italic">Pull back</text>

  <!-- Fireworks burst at final peak -->
  <g transform="translate(465, 60)">
    <!-- Central burst -->
    <circle cx="0" cy="0" r="6" fill="#FF30CC" opacity="0.4"/>

    <!-- Pink rays -->
    <line x1="0" y1="-10" x2="0" y2="-35" stroke="#FF30CC" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="-8" x2="25" y2="-28" stroke="#FF30CC" stroke-width="2" stroke-linecap="round"/>
    <line x1="10" y1="0" x2="35" y2="-5" stroke="#FF30CC" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="-8" x2="-25" y2="-28" stroke="#FF30CC" stroke-width="2" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="-30" y2="-8" stroke="#FF30CC" stroke-width="2" stroke-linecap="round"/>
    <line x1="5" y1="8" x2="18" y2="20" stroke="#FF30CC" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-5" y1="8" x2="-15" y2="22" stroke="#FF30CC" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Lime sparks -->
    <circle cx="15" cy="-20" r="3" fill="#CCFD28"/>
    <circle cx="-18" cy="-15" r="2.5" fill="#CCFD28"/>
    <circle cx="28" cy="-10" r="2" fill="#CCFD28"/>
    <circle cx="-8" cy="-30" r="2" fill="#CCFD28"/>
    <circle cx="10" cy="15" r="2" fill="#CCFD28"/>
    <circle cx="20" cy="-30" r="1.5" fill="#CCFD28"/>
    <circle cx="-22" cy="-25" r="1.5" fill="#CCFD28"/>

    <!-- Pink dots -->
    <circle cx="-15" cy="-35" r="2" fill="#FF30CC"/>
    <circle cx="30" cy="-20" r="1.5" fill="#FF30CC"/>
    <circle cx="-25" cy="-5" r="2" fill="#FF30CC"/>
    <circle cx="12" cy="-38" r="1.5" fill="#FF30CC"/>

    <!-- Star at very top -->
    <polygon points="0,-40 2,-34 8,-34 3,-30 5,-24 0,-28 -5,-24 -3,-30 -8,-34 -2,-34" fill="#CCFD28"/>
  </g>

  <!-- "Let go!" label -->
  <text x="420" y="30" font-family="Arial, sans-serif" font-size="16" fill="#CCFD28" font-weight="bold" font-style="italic" transform="rotate(-15, 420, 30)">Let go!</text>

  <!-- Small pink stars scattered -->
  <g transform="translate(95, 445)">
    <polygon points="0,-6 1.5,-2 6,-2 2.5,1 3.5,5.5 0,3 -3.5,5.5 -2.5,1 -6,-2 -1.5,-2" fill="#FF30CC" opacity="0.4"/>
  </g>
  <g transform="translate(250, 468)">
    <polygon points="0,-5 1.2,-1.8 5,-1.8 2,0.8 3,4.5 0,2.5 -3,4.5 -2,0.8 -5,-1.8 -1.2,-1.8" fill="#FF30CC" opacity="0.3"/>
  </g>

  <!-- Subtle gradient glow behind final peak -->
  <ellipse cx="460" cy="120" rx="50" ry="80" fill="#FF30CC" opacity="0.06"/>
  <ellipse cx="460" cy="100" rx="35" ry="60" fill="#CCFD28" opacity="0.08"/>
</svg>